<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusHub — University of Lagos</title>
  <meta name="description" content="CampusHub: buy & sell, events, campus feed and vendor tools for University of Lagos students." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="app">

    <!-- ===== Desktop sidebar ===== -->
    <aside class="sidebar">
      <div class="wordmark">Campus<span>Hub.</span></div>
      <div class="uni-label">University of Lagos</div>

      <nav class="side-nav" id="sideNav">
        <button class="side-link active" data-tab="home">🏠 Home</button>
        <button class="side-link" data-tab="market">🛍️ Market</button>
        <button class="side-link" data-tab="events">🎟️ Events</button>
        <button class="side-link" data-tab="study">📚 Study</button>
        <button class="side-link" data-tab="shop">💼 My Shop</button>
      </nav>

      <button class="side-link settings-link" data-act="open-settings">⚙️ Settings</button>
      <p class="side-note">Works on any device with a browser — no download needed.</p>
    </aside>

    <!-- ===== Main column ===== -->
    <div class="main-col">

      <!-- Mobile header -->
      <header class="mobile-header">
        <div>
          <div class="wordmark">Campus<span>Hub.</span></div>
          <div class="uni-label">University of Lagos</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="gear-btn" data-act="open-settings">⚙️</button>
          <div class="avatar">S</div>
        </div>
      </header>

      <main class="content" id="content">
        <!-- Screens are rendered here by js/app.js -->
      </main>
    </div>
  </div>

  <!-- ===== Mobile bottom nav ===== -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" data-tab="home"><span class="nav-ico">🏠</span>Home</button>
    <button class="nav-btn" data-tab="market"><span class="nav-ico">🛍️</span>Market</button>
    <button class="nav-btn" data-tab="events"><span class="nav-ico">🎟️</span>Events</button>
    <button class="nav-btn" data-tab="study"><span class="nav-ico">📚</span>Study</button>
    <button class="nav-btn" data-tab="shop"><span class="nav-ico">💼</span>My Shop</button>
  </nav>

  <!-- ===== Modal + toast + chat mount points ===== -->
  <div id="modalRoot"></div>
  <div id="chatRoot"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
